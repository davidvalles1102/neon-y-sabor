<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neón y Sabor — Mi Perfil</title>
  <link rel="stylesheet" href="../shared/css/design-system.css">
  <link rel="stylesheet" href="css/customer.css">
</head>
<body>

<nav class="cust-nav" id="navbar">
  <div class="cust-nav__inner">
    <a href="index.html" class="cust-nav__brand">
      <span class="brand-neon">Neón</span>
      <span class="brand-sep"> y </span>
      <span class="brand-rest">Sabor Mi Rancho</span>
    </a>
    <div class="cust-nav__links">
      <a href="index.html"        class="nav-link">Menú</a>
      <a href="order.html"        class="nav-link">🛵 Ordenar</a>
      <a href="reservations.html" class="nav-link">Reservaciones</a>
      <a href="profile.html"      class="nav-link active">Mi Perfil</a>
      <button class="btn btn-outline btn-sm" id="logoutBtn">Salir</button>
    </div>
  </div>
</nav>

<div id="authGate" class="auth-gate-full hidden">
  <p class="text-secondary">Debes iniciar sesión para ver tu perfil.</p>
  <a href="auth.html" class="btn btn-primary mt-16">Ingresar</a>
</div>

<div id="profileContent" class="profile-layout hidden">

  <!-- LEFT: User info -->
  <aside class="profile-sidebar">
    <div class="avatar-wrap">
      <div class="avatar-circle" id="avatarCircle">?</div>
    </div>
    <h2 id="profileName" class="text-center mt-8">—</h2>
    <p id="profileEmail" class="text-muted text-sm text-center">—</p>

    <!-- Loyalty Points Card -->
    <div class="points-card mt-24">
      <div class="points-label">Puntos de Lealtad</div>
      <div class="points-value neon-green" id="loyaltyPoints">0</div>
      <div class="points-sub">≈ $<span id="loyaltyValue">0.00</span> en consumo</div>
    </div>

    <button class="btn btn-outline btn-full mt-16" id="editProfileBtn">Editar Perfil</button>
    <button class="btn btn-ghost btn-full mt-8"  id="logoutBtnSide">Cerrar Sesión</button>
  </aside>

  <!-- RIGHT: Activity -->
  <div class="profile-main">

    <!-- Stats Row -->
    <div class="profile-stats">
      <div class="stat-card stat-green">
        <div class="stat-label">Total Visitas</div>
        <div class="stat-value" id="totalVisits">0</div>
      </div>
      <div class="stat-card stat-amber">
        <div class="stat-label">Total Gastado</div>
        <div class="stat-value" id="totalSpent">$0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Puntos Canjeados</div>
        <div class="stat-value" id="totalRedeemed">0</div>
      </div>
    </div>

    <!-- Reservations History -->
    <div class="card mt-24">
      <h3 class="mb-16">Mis Reservaciones</h3>
      <div id="reservationsList">
        <p class="text-muted text-sm">Cargando...</p>
      </div>
    </div>

    <!-- Loyalty History -->
    <div class="card mt-24">
      <h3 class="mb-16">Historial de Puntos</h3>
      <div id="loyaltyList">
        <p class="text-muted text-sm">Cargando...</p>
      </div>
    </div>
  </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal-backdrop hidden" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Editar Perfil</h3>
      <button class="modal-close" id="editModalClose">✕</button>
    </div>
    <div class="modal-body">
      <form id="editForm" class="flex-col gap-16">
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input type="text" id="editName" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <input type="tel" id="editPhone" class="form-control">
        </div>
        <div id="editMsg" class="alert hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Guardar Cambios</button>
      </form>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module" src="js/profile.js"></script>
</body>
</html>
