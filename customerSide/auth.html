<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neón y Sabor — Cuenta</title>
  <link rel="stylesheet" href="../shared/css/design-system.css">
  <link rel="stylesheet" href="css/customer.css">
</head>
<body class="auth-page">

<div class="auth-bg">
  <div class="auth-bg__grid"></div>
  <div class="auth-bg__glow auth-bg__glow--green"></div>
  <div class="auth-bg__glow auth-bg__glow--amber"></div>
</div>

<div class="auth-card">
  <a href="index.html" class="auth-logo">
    <span class="neon-green">Neón</span> y Sabor Mi Rancho
  </a>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login"    data-tab="login">Iniciar Sesión</button>
    <button class="auth-tab"        id="tab-register" data-tab="register">Crear Cuenta</button>
  </div>

  <!-- LOGIN FORM -->
  <form id="loginForm" class="auth-form" autocomplete="off">
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="tucorreo@email.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
    </div>
    <div id="loginError" class="alert alert-error hidden"></div>
    <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Iniciar Sesión</button>
    <p class="text-center text-sm text-muted mt-16">
      ¿Olvidaste tu contraseña? <a href="#" id="forgotLink" class="text-green">Restablecer</a>
    </p>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" class="auth-form hidden" autocomplete="off">
    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input type="text" id="regName" class="form-control" placeholder="Tu nombre" required>
    </div>
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="regEmail" class="form-control" placeholder="tucorreo@email.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Teléfono</label>
      <input type="tel" id="regPhone" class="form-control" placeholder="+503 0000-0000">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="regPassword" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar contraseña</label>
      <input type="password" id="regPasswordConfirm" class="form-control" placeholder="Repite tu contraseña" required>
    </div>
    <div id="registerError" class="alert alert-error hidden"></div>
    <div id="registerSuccess" class="alert alert-success hidden"></div>
    <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Crear Cuenta</button>
  </form>

  <!-- FORGOT PASSWORD FORM -->
  <form id="forgotForm" class="auth-form hidden">
    <p class="text-secondary text-sm mb-16">Te enviaremos un enlace para restablecer tu contraseña.</p>
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="forgotEmail" class="form-control" placeholder="tucorreo@email.com" required>
    </div>
    <div id="forgotMsg" class="alert hidden"></div>
    <button type="submit" class="btn btn-primary btn-full">Enviar enlace</button>
    <button type="button" id="backToLogin" class="btn btn-ghost btn-full mt-8">← Volver al login</button>
  </form>

  <!-- RESET PASSWORD FORM (shown after clicking email recovery link) -->
  <form id="resetForm" class="auth-form hidden">
    <p class="text-secondary text-sm mb-16">Crea tu nueva contraseña.</p>
    <div class="form-group">
      <label class="form-label">Nueva contraseña</label>
      <input type="password" id="resetPassword" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar contraseña</label>
      <input type="password" id="resetPasswordConfirm" class="form-control" placeholder="Repite tu contraseña" required>
    </div>
    <div id="resetMsg" class="alert hidden"></div>
    <button type="submit" class="btn btn-primary btn-full" id="resetBtn">Guardar Nueva Contraseña</button>
  </form>
</div>

<div id="toast-container"></div>
<script type="module" src="js/auth.js"></script>
</body>
</html>
