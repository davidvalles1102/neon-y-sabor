<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap">

  <title>Mesas & QR — Crunchies</title>
  <link rel="stylesheet" href="../shared/css/design-system.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .tables-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
    }
    .tbl-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color var(--t);
    }
    .tbl-card--available  { border-color: var(--green-dim); }
    .tbl-card--occupied   { border-color: var(--danger); }
    .tbl-card--reserved   { border-color: var(--amber-dim); }
    .tbl-card--maintenance{ border-color: var(--border); }
    .tbl-card__top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .tbl-card__num {
      font-family: var(--font-d);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .tbl-card--available  .tbl-card__num { color: var(--green); text-shadow: var(--glow-green-s); }
    .tbl-card--occupied   .tbl-card__num { color: var(--danger); }
    .tbl-card--reserved   .tbl-card__num { color: var(--amber); }
    .tbl-card--maintenance .tbl-card__num { color: var(--text-muted); }
    .tbl-card__meta {
      font-size: .78rem;
      color: var(--text-secondary);
      text-transform: capitalize;
    }
    .tbl-card__actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    /* QR Modal */
    .qr-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    #qrCanvas {
      border-radius: var(--r-md);
      border: 6px solid #fff;
      display: block;
    }
    .qr-url {
      font-size: .7rem;
      color: var(--text-secondary);
      word-break: break-all;
      max-width: 280px;
    }
  </style>
</head>
<body class="admin-body">

<aside class="sidebar" id="sidebar">
  <div class="sidebar__brand">CRUNCHIES</div>
  <nav class="sidebar__nav">
    <a href="dashboard.html"       class="slink">📊 Dashboard</a>
    <a href="orders.html"          class="slink">🧾 Órdenes</a>
    <a href="kitchen.html"         class="slink">👨‍🍳 Cocina</a>
    <a href="reservations.html"    class="slink">📅 Reservaciones</a>
    <a href="delivery.html"        class="slink">🛵 Delivery</a>
    <a href="payments.html"        class="slink">💳 Pagos</a>
    <a href="expense-tracker.html" class="slink">💸 Gastos</a>
    <a href="finance.html"         class="slink">💰 Finanzas</a>
    <a href="menu-management.html" class="slink">🍽️ Menú</a>
    <a href="reports.html"         class="slink">📈 Reportes</a>
    <a href="customers.html"       class="slink">👥 Clientes</a>
    <a href="tables.html"          class="slink active">🪑 Mesas</a>
  </nav>
  <div class="sidebar__footer">
    <div class="sidebar__user" id="sidebarUser">—</div>
    <button class="slink slink--danger" id="logoutBtn">⏻ Salir</button>
  </div>
</aside>

<div class="admin-main">
  <header class="admin-topbar">
    <button class="topbar__toggle" id="sidebarToggle">☰</button>
    <h1 class="topbar__title">Mesas & QR</h1>
    <div class="topbar__right">
      <button class="btn btn-outline btn-sm" id="showMenuQrBtn">📋 QR del Menú (Vitrina)</button>
      <span id="liveClock" class="text-muted text-sm"></span>
    </div>
  </header>

  <div class="admin-content">
    <div class="tables-grid" id="tablesGrid">
      <p class="text-muted">Cargando mesas...</p>
    </div>
  </div>
</div>

<!-- QR Modal -->
<div class="modal-backdrop hidden" id="qrModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <h3 id="qrModalTitle">QR — Mesa</h3>
      <button class="modal-close" id="qrModalClose">✕</button>
    </div>
    <div class="modal-body qr-body">
      <p class="text-muted text-sm hidden" id="qrModalSubtitle"></p>
      <div id="qrContainer"
           style="border-radius:var(--r-md);overflow:hidden;border:6px solid #fff;
                  display:inline-block;background:#fff;width:256px;height:256px"></div>
      <p class="qr-url" id="qrUrl"></p>
      <button class="btn btn-primary btn-full" id="downloadQrBtn">⬇ Descargar PNG</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script type="module" src="js/tables.js"></script>
</body>
</html>
