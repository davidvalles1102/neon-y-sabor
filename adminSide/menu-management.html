<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@600;700&display=swap">

  <title>Gestión de Menú — Neón y Sabor</title>
  <link rel="stylesheet" href="../shared/css/design-system.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<aside class="sidebar" id="sidebar">
  <div class="sidebar__brand"><span class="neon-green">N</span><span class="neon-amber">y</span>S</div>
  <nav class="sidebar__nav">
    <a href="dashboard.html"       class="slink">📊 Dashboard</a>
    <a href="orders.html"          class="slink">🧾 Órdenes</a>
    <a href="kitchen.html"         class="slink">👨‍🍳 Cocina</a>
    <a href="reservations.html"    class="slink">📅 Reservaciones</a>
    <a href="delivery.html"        class="slink">🛵 Delivery</a>
    <a href="payments.html"        class="slink">💳 Pagos</a>
    <a href="expense-tracker.html" class="slink">💸 Gastos</a>
    <a href="menu-management.html" class="slink active">🍽️ Menú</a>
    <a href="reports.html"         class="slink">📈 Reportes</a>
    <a href="customers.html"       class="slink">👥 Clientes</a>
    <a href="tables.html"          class="slink">🪑 Mesas</a>
  </nav>
  <div class="sidebar__footer">
    <div class="sidebar__user" id="sidebarUser">—</div>
    <button class="slink slink--danger" id="logoutBtn">⏻ Salir</button>
  </div>
</aside>

<div class="admin-main">
  <header class="admin-topbar">
    <button class="topbar__toggle" id="sidebarToggle">☰</button>
    <h1 class="topbar__title">Gestión de Menú</h1>
    <div class="topbar__right">
      <button class="btn btn-primary btn-sm" id="addItemBtn">+ Agregar Platillo</button>
      <button class="btn btn-outline btn-sm" id="manageModsBtn">Modificadores</button>
      <button class="btn btn-outline btn-sm" id="manageCatsBtn">Categorías</button>
    </div>
  </header>

  <div class="admin-content">
    <!-- Filter tabs -->
    <div class="category-tabs" id="menuCatTabs" style="margin-bottom:20px">
      <button class="cat-tab active" data-cat="all">Todos</button>
    </div>

    <!-- Menu Items Grid -->
    <div class="menu-mgmt-grid" id="menuMgmtGrid">
      <div class="text-muted text-sm">Cargando...</div>
    </div>
  </div>
</div>

<!-- Add/Edit Item Modal -->
<div class="modal-backdrop hidden" id="itemModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3 id="itemModalTitle">Nuevo Platillo</h3>
      <button class="modal-close" id="itemModalClose">✕</button>
    </div>
    <div class="modal-body">
      <form id="itemForm" class="flex-col gap-16">
        <input type="hidden" id="itemId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nombre *</label>
            <input type="text" id="itemName" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Categoría *</label>
            <select id="itemCategory" class="form-control" required>
              <option value="">Seleccionar...</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <textarea id="itemDescription" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Precio *</label>
            <input type="number" id="itemPrice" class="form-control" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label class="form-label">URL de Imagen</label>
            <input type="url" id="itemImageUrl" class="form-control" placeholder="https://...">
          </div>
        </div>
        <div class="flex gap-16">
          <label class="checkbox-label">
            <input type="checkbox" id="itemAvailable" checked>
            <span>Disponible</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="itemFeatured">
            <span>Destacado ⭐</span>
          </label>
        </div>
        <div class="form-group">
          <label class="form-label">Variaciones (tamaño, extras, etc.)</label>
          <div id="itemModGroups" class="flex-col gap-8" style="max-height:140px;overflow-y:auto;padding:8px;border:1px solid var(--border);border-radius:var(--r-md)">
            <p class="text-muted text-sm">Sin grupos de modificadores creados. Usa "Modificadores" en la barra superior.</p>
          </div>
        </div>
        <div id="itemFormMsg" class="alert hidden"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="itemModalCancel">Cancelar</button>
      <button class="btn btn-primary" id="saveItemBtn">Guardar</button>
    </div>
  </div>
</div>

<!-- Category Management Modal -->
<div class="modal-backdrop hidden" id="catsModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Categorías</h3>
      <button class="modal-close" id="catsModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div id="catsList" class="flex-col gap-8"></div>
      <form id="addCatForm" class="flex gap-8 mt-16">
        <input type="text" id="newCatName"  class="form-control" placeholder="Nombre" style="flex:1">
        <input type="text" id="newCatIcon"  class="form-control" placeholder="Emoji" style="width:70px">
        <button type="submit" class="btn btn-primary">+ Agregar</button>
      </form>
    </div>
  </div>
</div>

<!-- Modifier Groups Management Modal -->
<div class="modal-backdrop hidden" id="modsModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3>Grupos de Modificadores</h3>
      <button class="modal-close" id="modsModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div id="modGroupsList" class="flex-col gap-16"></div>

      <hr class="receipt__divider mt-16">

      <h4 class="mt-16 mb-16">Nuevo grupo</h4>
      <form id="addModGroupForm" class="flex-col gap-12">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" id="newModGroupName" class="form-control" placeholder="Ej: Tamaño de pan" required>
          </div>
          <div class="form-group">
            <label class="form-label">Tipo</label>
            <select id="newModGroupType" class="form-control">
              <option value="single">Selección única</option>
              <option value="multiple">Selección múltiple</option>
            </select>
          </div>
        </div>
        <div class="flex gap-16 items-center">
          <label class="checkbox-label">
            <input type="checkbox" id="newModGroupRequired">
            <span>Obligatorio</span>
          </label>
          <div class="form-group hidden" style="flex:1" id="newModGroupMaxWrap">
            <input type="number" id="newModGroupMax" class="form-control" placeholder="Máx. opciones (multiple)" min="1">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">+ Crear Grupo</button>
      </form>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module" src="js/menu-management.js"></script>
</body>
</html>
