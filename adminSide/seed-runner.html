<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando datos demo — Crunchies</title>
  <link rel="stylesheet" href="../shared/css/design-system.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .seed-wrap { max-width: 540px; margin: 10vh auto; padding: 40px; }
    .seed-bar-track { background: var(--bg2); border-radius: 8px; height: 12px; margin: 20px 0; overflow: hidden; }
    .seed-bar-fill  { background: var(--green); height: 100%; width: 0; transition: width .3s ease; border-radius: 8px; }
    .seed-log  { font-size: .8rem; color: var(--muted); margin-top: 12px; min-height: 1.4em; }
    .seed-done { color: var(--green); font-weight: 600; font-size: 1.1rem; margin-top: 20px; display: none; }
    .seed-err  { background: rgba(255,68,85,.1); border: 1px solid var(--danger); border-radius: 8px;
                 padding: 16px; margin-top: 20px; display: none; }
  </style>
</head>
<body class="admin-body" style="align-items:flex-start">

<div class="card seed-wrap">
  <h2 style="margin-bottom:8px">⚙️ Cargando datos demo</h2>
  <p class="text-muted text-sm">30 días de ventas y gastos. No cierres esta pestaña.</p>

  <div class="seed-bar-track"><div class="seed-bar-fill" id="bar"></div></div>
  <div style="display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted)">
    <span id="dayLabel">Verificando…</span>
    <span id="dayCount">0 / 30</span>
  </div>
  <div class="seed-log" id="log"></div>
  <div class="seed-done" id="done">✓ 30 días cargados — redirigiendo a Finanzas…</div>
  <div class="seed-err" id="errBox">
    <strong style="color:var(--danger)">Error</strong>
    <p id="errMsg" style="font-size:.85rem;margin-top:6px"></p>
  </div>
</div>

<script type="module">
import { supabase, requireAuth } from '../shared/supabase-client.js'

const ctx = await requireAuth(['admin', 'waiter'])
if (!ctx) return

const ITEMS = [
  { name: 'Pollo Entero',     price: 12 },
  { name: 'Media Pollo',      price: 7  },
  { name: '1/4 Pollo',        price: 5  },
  { name: 'Alas 6 pzs',       price: 8  },
  { name: 'Alas 12 pzs',      price: 14 },
  { name: 'Combo Rancho',     price: 10 },
  { name: 'Sopa de Gallina',  price: 8  },
  { name: 'Enchiladas 3 pzs', price: 5  },
  { name: 'Arroz con Pollo',  price: 7  },
  { name: 'Refresco',         price: 2  },
  { name: 'Agua Pura',        price: 1  },
]

const ri   = (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo
const pick = ()       => ITEMS[Math.floor(Math.random() * ITEMS.length)]
const mkTs = (base, sec) => { const d = new Date(base); d.setSeconds(d.getSeconds() + sec); return d.toISOString() }

const bar      = document.getElementById('bar')
const dayLabel = document.getElementById('dayLabel')
const dayCount = document.getElementById('dayCount')
const log      = document.getElementById('log')

function fatal(msg) {
  document.getElementById('errMsg').textContent = msg
  document.getElementById('errBox').style.display = 'block'
  dayLabel.textContent = 'Error'
}

// Verify expenses table exists (requires expenses_create.sql to have been run)
const { error: tableCheck } = await supabase.from('expenses').select('id').limit(1)
if (tableCheck && tableCheck.code === '42P01') {
  fatal('La tabla "expenses" no existe. Ejecuta primero supabase/expenses_create.sql en Supabase SQL Editor, luego vuelve aquí.')
  throw new Error('missing expenses table')
}

for (let d = 0; d < 30; d++) {
  const base = new Date()
  base.setDate(base.getDate() - (30 - d))
  base.setHours(10, 0, 0, 0)
  const dateStr = base.toISOString().split('T')[0]
  const dow     = base.getDay()
  const dom     = base.getDate()

  const numOrders = dow === 5 ? ri(15, 23) : (dow === 0 || dow === 6) ? ri(18, 28) : ri(9, 16)
  dayLabel.textContent = dateStr
  dayCount.textContent = `${d} / 30`
  log.textContent      = `Insertando ${numOrders} órdenes…`

  // Build records for the day
  const orders   = []
  const allItems = []
  const payments = []

  for (let n = 0; n < numOrders; n++) {
    const oid     = crypto.randomUUID()
    const created = mkTs(base, ri(0, 36000))
    let total = 0

    for (let i = 0; i < ri(1, 4); i++) {
      const item = pick()
      const qty  = ri(1, 3)
      total += item.price * qty
      allItems.push({ order_id: oid, item_name: item.name, item_price: item.price, quantity: qty, created_at: created })
    }

    orders.push({ id: oid, order_type: 'dine-in', status: 'paid',
                  subtotal: total, tax: 0, total, created_at: created, updated_at: created })

    const r = Math.random()
    payments.push({ order_id: oid, amount: total, created_at: created,
                    method: r < 0.75 ? 'cash' : r < 0.95 ? 'card' : 'transfer',
                    receipt_number: `R-SEED-${String(d * 100 + n + 1).padStart(5, '0')}` })
  }

  // Orders must commit before items (FK constraint) — sequential
  const { error: e1 } = await supabase.from('orders').insert(orders)
  if (e1) { fatal(`Error órdenes (día ${dateStr}): ${e1.message}`); break }

  // Items + payments can run in parallel once orders are committed
  const [{ error: e2 }, { error: e3 }] = await Promise.all([
    supabase.from('order_items').insert(allItems),
    supabase.from('payments').insert(payments)
  ])
  if (e2) { fatal(`Error ítems (día ${dateStr}): ${e2.message}`); break }
  if (e3) { fatal(`Error pagos (día ${dateStr}): ${e3.message}`); break }

  // Expenses
  const expenses = [{
    expense_date: dateStr, category: 'insumos',
    description: 'Compra de insumos del día', amount: ri(50, 80), payment_method: 'cash'
  }]
  if (dow === 1)           expenses.push({ expense_date: dateStr, category: 'nomina',        description: 'Pago semanal de personal',         amount: 175, payment_method: 'transfer' })
  if (dom === 1)           expenses.push({ expense_date: dateStr, category: 'renta',         description: 'Renta mensual del local',           amount: 350, payment_method: 'transfer' },
                                          { expense_date: dateStr, category: 'servicios',     description: 'Agua, luz e internet',             amount: 120, payment_method: 'transfer' })
  if (dom === 1||dom===15) expenses.push({ expense_date: dateStr, category: 'mantenimiento', description: 'Mantenimiento de equipo de cocina', amount: 40,  payment_method: 'cash'     })
  if (dom === 7||dom===21) expenses.push({ expense_date: dateStr, category: 'marketing',     description: 'Redes sociales y publicidad',       amount: 30,  payment_method: 'card'     })
  if (Math.random()<0.3)   expenses.push({ expense_date: dateStr, category: 'transporte',    description: 'Transporte y entregas del día',     amount: ri(15, 30), payment_method: 'cash' })

  const { error: e4 } = await supabase.from('expenses').insert(expenses)
  if (e4) { fatal(`Error gastos (día ${dateStr}): ${e4.message}`); break }

  bar.style.width = `${((d + 1) / 30) * 100}%`
  await new Promise(r => setTimeout(r, 20))
}

if (!document.getElementById('errBox').style.display || document.getElementById('errBox').style.display === 'none') {
  dayCount.textContent = '30 / 30'
  log.textContent      = 'Sin errores.'
  document.getElementById('done').style.display = 'block'
  setTimeout(() => { window.location.href = 'finance.html' }, 2500)
}
</script>
</body>
</html>
