<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@600;700&display=swap">

  <title>Cocina — Neón y Sabor</title>
  <link rel="stylesheet" href="../shared/css/design-system.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body kitchen-body">

<!-- Minimal top bar for kitchen display -->
<header class="kitchen-topbar">
  <div class="kitchen-brand">
    <span class="neon-green">Cocina</span>
    <span class="text-muted"> — Neón y Sabor Mi Rancho</span>
  </div>
  <div class="kitchen-topbar__right">
    <div class="live-clock" id="liveClock"></div>
    <a href="dashboard.html" class="btn btn-ghost btn-sm">← Panel</a>
  </div>
</header>

<div class="kitchen-layout">

  <!-- Column: Entrantes (in_kitchen) -->
  <div class="kitchen-col">
    <div class="kitchen-col__header">
      <span class="badge badge-amber" style="font-size:.9rem;padding:6px 14px">🔥 EN PREPARACIÓN</span>
      <span class="badge badge-muted" id="countInKitchen">0</span>
    </div>
    <div class="kitchen-orders" id="ordersInKitchen">
      <div class="kitchen-empty">Sin órdenes en preparación</div>
    </div>
  </div>

  <!-- Column: Ready -->
  <div class="kitchen-col">
    <div class="kitchen-col__header">
      <span class="badge badge-green" style="font-size:.9rem;padding:6px 14px">✅ LISTO PARA SERVIR</span>
      <span class="badge badge-muted" id="countReady">0</span>
    </div>
    <div class="kitchen-orders" id="ordersReady">
      <div class="kitchen-empty">Sin órdenes listas</div>
    </div>
  </div>

</div>

<!-- ── Historial del día ─────────────────────────────────────────── -->
<div class="kitchen-history" id="kitchenHistorySection">
  <div class="kitchen-history__header" id="historyToggle">
    <span class="kitchen-history__title">📋 Historial de hoy</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="badge badge-muted" id="historyCount">0</span>
      <button class="btn btn-ghost btn-sm" id="historyToggleBtn" style="pointer-events:none">▲</button>
    </div>
  </div>
  <div class="kitchen-history__body" id="historyBody">
    <div class="kitchen-empty" style="padding:20px">Cargando historial...</div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module" src="js/kitchen.js"></script>
</body>
</html>
